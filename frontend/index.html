<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>LifeFrame</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <div class="particles"></div>

  <!-- HERO -->

  <header class="hero">

    <h1>🧠 LifeFrame</h1>

    <p>
      Your memories turned into a living museum
    </p>

    <button onclick="scrollFeed()">
      Enter Experience
    </button>

  </header>

  <!-- ADD MEMORY -->

  <section class="upload-section">

    <h2>Add a Memory</h2>

    <input
      type="text"
      id="title"
      placeholder="Memory title"
    >

    <textarea
      id="description"
      placeholder="Write your memory..."
    ></textarea>

    <input
      type="text"
      id="location"
      placeholder="Location"
    >

    <!-- IMAGE -->

    <input
      type="file"
      id="imageFile"
    >

    <!-- VOICE -->

    <label class="voice-label">

      🎙 Voice Memory

    </label>

    <input
      type="file"
      id="voiceFile"
      accept="audio/*"
    >

    <button onclick="addMemory()">
      Save Memory
    </button>

  </section>

  <!-- FEED -->

  <section class="feed-title">

    <h2>🌌 Memory Reel</h2>

  </section>

  <section id="timeline"></section>

  <!-- MODAL -->

  <div
    id="memoryModal"
    class="modal"
  >

    <div class="modal-content">

      <span
        class="close"
        onclick="closeModal()"
      >
        &times;
      </span>

      <img id="modalImage">

      <h2 id="modalTitle"></h2>

      <p id="modalDescription"></p>

      <small id="modalLocation"></small>

      <audio
        id="modalVoice"
        controls
      ></audio>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
