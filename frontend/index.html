<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>LifeFrame</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- LEAFLET MAP -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  >

</head>

<body>

  <!-- MUSIC -->
  <audio id="bgMusic" loop>

    <source
      src="../assets/music/ambient.mp3"
      type="audio/mpeg"
    >

  </audio>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <div class="particles"></div>

  <!-- HERO -->
  <header class="hero">

    <h1>🧠 LifeFrame</h1>

    <p>
      Your memories turned into a living museum
    </p>

    <div class="hero-buttons">

      <button onclick="enterMuseum()">
        Enter Experience
      </button>

      <button onclick="toggleMusic()">
        🎧 Toggle Music
      </button>

    </div>

  </header>

  <!-- UPLOAD -->
  <section class="upload-section">

    <h2>Add a Memory</h2>

    <input
      type="text"
      id="title"
      placeholder="Memory title"
    >

    <textarea
      id="description"
      placeholder="Write your memory..."
    ></textarea>

    <input
      type="text"
      id="location"
      placeholder="Location (example: Casablanca Beach)"
    >

    <!-- LATITUDE -->
    <input
      type="number"
      id="latitude"
      placeholder="Latitude (example: 33.5731)"
    >

    <!-- LONGITUDE -->
    <input
      type="number"
      id="longitude"
      placeholder="Longitude (example: -7.5898)"
    >

    <input
      type="file"
      id="imageFile"
    >

    <label class="voice-label">
      🎙 Voice Memory
    </label>

    <input
      type="file"
      id="voiceFile"
      accept="audio/*"
    >

    <button onclick="addMemory()">
      Save Memory
    </button>

  </section>

  <!-- MAP TITLE -->
  <section class="map-title">

    <h2>🌍 Memory World Map</h2>

  </section>

  <!-- MAP -->
  <div id="map"></div>

  <!-- FEED -->
  <section class="explore-title">

    <h2>🌌 Public Memory Feed</h2>

  </section>

  <section id="timeline"></section>

  <!-- MODAL -->
  <div
    id="memoryModal"
    class="modal"
  >

    <div class="modal-content">

      <span
        class="close"
        onclick="closeModal()"
      >
        &times;
      </span>

      <img id="modalImage">

      <h2 id="modalTitle"></h2>

      <p id="modalDescription"></p>

      <audio
        id="modalVoice"
        controls
      ></audio>

      <small id="modalDate"></small>

      <small id="modalLocation"></small>

    </div>

  </div>

  <!-- LEAFLET -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
