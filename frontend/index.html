<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeFrame - Your Memory Museum</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Background layer -->
  <div class="background"></div>

  <!-- Main container -->
  <header>
    <h1>🧠 LifeFrame</h1>
    <p>Your memories, turned into a living museum</p>
    <button onclick="startExperience()">Enter Museum</button>
  </header>

  <!-- Timeline section -->
  <section id="timeline">

    <div class="memory-card">
      <img src="assets/images/sample1.jpg" />
      <h3>First Day</h3>
      <p>A moment that changed everything...</p>
    </div>

    <div class="memory-card">
      <img src="assets/images/sample2.jpg" />
      <h3>Unexpected Laugh</h3>
      <p>One of those memories you replay in your head.</p>
    </div>

  </section>

  <script src="app.js"></script>
</body>
</html>
