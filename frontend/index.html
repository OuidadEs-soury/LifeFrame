<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>LifeFrame</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- BACKGROUND -->

  <div class="background-glow"></div>

  <!-- HERO -->

  <header class="hero">

    <h1>🧠 LifeFrame</h1>

    <p>
      Your memories turned into a cinematic universe
    </p>

    <button onclick="scrollTimeline()">
      Enter Experience
    </button>

  </header>

  <!-- ADD MEMORY -->

  <section class="upload-box">

    <h2>Add a Memory</h2>

    <input
      type="text"
      id="title"
      placeholder="Memory title"
    >

    <textarea
      id="description"
      placeholder="Write your memory..."
    ></textarea>

    <input
      type="text"
      id="location"
      placeholder="Location"
    >

    <!-- IMAGE -->

    <input
      type="file"
      id="imageFile"
    >

    <!-- VOICE -->

    <label class="voice-label">

      🎙 Voice Memory

    </label>

    <input
      type="file"
      id="voiceFile"
      accept="audio/*"
    >

    <button onclick="addMemory()">
      Save Memory
    </button>

  </section>

  <!-- TIMELINE -->

  <section class="timeline-section">

    <h2 class="timeline-title">
      🌌 Memory Timeline
    </h2>

    <div id="timeline"></div>

  </section>

  <!-- CINEMA MODAL -->

  <div
    id="cinemaModal"
    class="cinema-modal"
  >

    <span
      class="close-btn"
      onclick="closeCinema()"
    >
      ✕
    </span>

    <div class="cinema-content">

      <img id="cinemaImage">

      <div class="cinema-text">

        <h1 id="cinemaTitle"></h1>

        <p id="cinemaDescription"></p>

        <small id="cinemaLocation"></small>

        <audio
          id="cinemaVoice"
          controls
        ></audio>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
