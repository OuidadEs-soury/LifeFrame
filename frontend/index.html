<html lang="en">
    >

    <textarea
      id="description"
      placeholder="Write your memory..."
    ></textarea>

    <input
      type="text"
      id="location"
      placeholder="Location (ex: Casablanca Beach)"
    >

    <input
      type="file"
      id="imageFile"
    >

    <label class="voice-label">
      🎙 Voice Memory
    </label>

    <input
      type="file"
      id="voiceFile"
      accept="audio/*"
    >

    <button onclick="addMemory()">
      Save Memory
    </button>

  </section>

  <section class="explore-title">
    <h2>🌍 Public Memory Feed</h2>
  </section>

  <section id="timeline"></section>

  <div id="memoryModal" class="modal">

    <div class="modal-content">

      <span
        class="close"
        onclick="closeModal()"
      >
        &times;
      </span>

      <img id="modalImage">

      <h2 id="modalTitle"></h2>

      <p id="modalDescription"></p>

      <audio
        id="modalVoice"
        controls
      ></audio>

      <small id="modalDate"></small>

      <small id="modalLocation"></small>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
